name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate version tag
        id: version
        shell: bash
        run: |
          BASE="v$(date +'%Y.%m.%d')"
          TAG="$BASE"
          SUFFIX=1
          while git ls-remote --tags origin "$TAG" | grep -q .; do
            TAG="${BASE}-${SUFFIX}"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject version into app.py
        shell: pwsh
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $version = $env:TAG -replace '^v', ''
          (Get-Content app.py) -replace '0\.0\.0', $version | Set-Content app.py

      - name: Inject PAT into app.py
        shell: pwsh
        env:
          SPARNESSA_PAT: ${{ secrets.SPARNESSA_PAT }}
        run: |
          (Get-Content app.py) -replace 'GITHUB_PAT_PLACEHOLDER', $env:SPARNESSA_PAT | Set-Content app.py
          (Get-Content backend/api/update_routes.py) -replace 'GITHUB_PAT_PLACEHOLDER', $env:SPARNESSA_PAT | Set-Content backend/api/update_routes.py

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --noconsole
          --add-data "templates;templates"
          --add-data "static;static"
          --name Sparnessa
          app.py

      - name: Create release and attach EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Sparnessa ${{ steps.version.outputs.tag }}
          files: dist/Sparnessa.exe
